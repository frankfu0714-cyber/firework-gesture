<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0e2a">
<title>幫你放煙火 · Wave to Spark Fireworks</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #0a0e2a;
    -webkit-user-select: none;
    user-select: none;
    touch-action: none;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", "Hiragino Sans GB", sans-serif;
    color: #fff;
  }

  #canvas {
    position: fixed; inset: 0;
    display: block;
    width: 100vw; height: 100vh;
  }

  #video {
    position: fixed;
    bottom: 20px; right: 20px;
    width: 180px; height: 135px;
    object-fit: cover;
    border-radius: 14px;
    border: 1px solid rgba(255, 216, 107, 0.25);
    box-shadow: 0 12px 36px rgba(0,0,0,0.55), 0 0 24px rgba(255, 107, 53, 0.12);
    transform: scaleX(-1);
    opacity: 0.55;
    z-index: 5;
    pointer-events: none;
    background: #000;
    transition: opacity 0.6s ease;
  }
  #video.idle { opacity: 0.35; }

  #title-wrap {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    z-index: 10;
    pointer-events: none;
    animation: titleFade 4.5s ease forwards;
  }
  #title-wrap .zh {
    font-size: clamp(36px, 6vw, 64px);
    letter-spacing: 0.18em;
    color: #ffd86b;
    font-weight: 200;
    text-shadow:
      0 0 24px rgba(255, 200, 87, 0.6),
      0 0 60px rgba(255, 107, 53, 0.35);
    margin-bottom: 18px;
  }
  #title-wrap .en {
    font-size: clamp(11px, 1.2vw, 14px);
    letter-spacing: 0.45em;
    font-weight: 300;
    color: rgba(255,255,255,0.55);
    text-transform: uppercase;
  }
  @keyframes titleFade {
    0% { opacity: 0; transform: translateY(8px); }
    15% { opacity: 1; transform: translateY(0); }
    75% { opacity: 1; transform: translateY(0); }
    100% { opacity: 0; transform: translateY(-8px); visibility: hidden; }
  }

  #message {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    padding: 28px 36px;
    background: rgba(10, 14, 42, 0.92);
    border-radius: 16px;
    border: 1px solid rgba(255, 216, 107, 0.4);
    box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 32px rgba(255, 107, 53, 0.2);
    z-index: 100;
    max-width: 86%;
    display: none;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  #message.show { display: block; }
  #message p { margin: 10px 0; line-height: 1.6; }
  #message .zh { color: #ffd86b; font-size: 18px; letter-spacing: 0.05em; }
  #message .en { color: rgba(255,255,255,0.75); font-size: 14px; letter-spacing: 0.04em; }

  #hint {
    position: fixed;
    bottom: 24px; left: 24px;
    color: rgba(255, 216, 107, 0.55);
    font-size: 12px;
    letter-spacing: 0.18em;
    z-index: 4;
    pointer-events: none;
    text-transform: uppercase;
    opacity: 0;
    animation: hintFade 6s ease forwards;
    animation-delay: 4s;
  }
  @keyframes hintFade {
    0% { opacity: 0; }
    20% { opacity: 1; }
    80% { opacity: 1; }
    100% { opacity: 0; visibility: hidden; }
  }
</style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <video id="video" autoplay muted playsinline></video>

  <div id="title-wrap">
    <div class="zh">幫你放煙火</div>
    <div class="en">Wave to Spark Fireworks</div>
  </div>

  <div id="hint" data-desktop="Wave your hand to ignite the sky" data-mobile="Tap to ignite the sky"></div>

  <div id="message">
    <p class="zh">需要相機權限以追蹤手勢，請允許後重新整理</p>
    <p class="en">Webcam needed to track your hand — please allow and refresh</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/hands.js" crossorigin="anonymous"></script>
  <script src="app.js"></script>
</body>
</html>
